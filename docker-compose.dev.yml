# Dev override: no NVIDIA GPU required
# Usage: docker compose -f docker-compose.dev.yml up
services:
  gpu-hot:
    build:
      context: .
      target: dev
    image: gpu-hot:dev
    container_name: gpu-hot-dev
    ports:
      - "1312:1312"
    environment:
      - NODE_NAME=dev-node
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1312/api/gpu-data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
